<!DOCTYPE html>
<html lang="en" ng-app="adminFashionApp">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fashion Admin Panel</title>
  <meta name="description" content="Admin panel for managing fashion items" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- AngularJS -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-sanitize.min.js"></script>

  <!-- Summernote WYSIWYG -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote.min.css" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Top Navigation -->
  <nav class="admin-nav">
    <div class="nav-brand">
      <span class="brand-icon">✦</span>
      <span class="brand-text">Fashion Admin</span>
    </div>
    <div class="nav-links">
      <a href="#!/" class="nav-link">Dashboard</a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="admin-main">
    <div ng-view></div>
  </main>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" ng-if="showDeleteModal" ng-click="cancelDelete()">
    <div class="modal-container" ng-click="$event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-icon">⚠️</span>
        <h3>Confirm Deletion</h3>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete <strong>{{deletingFashion.title}}</strong>?</p>
        <p class="modal-subtitle">This action cannot be undone.</p>
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" ng-click="cancelDelete()">Cancel</button>
        <button class="btn btn-danger" ng-click="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
