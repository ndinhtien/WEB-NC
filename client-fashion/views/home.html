<!-- Home View: Fashions grouped by Style -->
<div class="search-section">
    <div class="search-bar">
        <input type="text" class="search-input" ng-model="searchStyle" placeholder='Try "Street Style"' />
        <select class="search-select" ng-model="selectedStyle" ng-change="onDropdownChange()">
            <option value="">-- All Styles --</option>
            <option ng-repeat="s in styles" value="{{s}}">{{s}}</option>
        </select>
        <button class="search-btn" ng-click="filterByStyle()">SEARCH</button>
        <button class="search-btn clear-btn" ng-if="isFiltered" ng-click="clearFilter()">CLEAR</button>
    </div>
</div>

<div class="loading-container" ng-if="loading">
    <div class="loading-spinner"></div>
</div>

<div ng-if="!loading">
    <!-- No results -->
    <div class="no-results" ng-if="(groupedFashions | json) === '{}'">
        <p>No fashions found for this style.</p>
    </div>

    <!-- Style groups -->
    <div ng-repeat="(style, fashions) in groupedFashions">
        <div class="style-section">
            <h2 class="style-title">{{style}}</h2>
        </div>
        <div class="fashion-grid">
            <a class="fashion-card" ng-repeat="fashion in fashions" href="#!/detail/{{fashion._id}}">
                <div class="card-image-wrapper">
                    <img ng-src="{{fashion.thumbnail}}" alt="{{fashion.title}}" class="card-image" />
                </div>
                <div class="card-body">
                    <h3 class="card-title">{{fashion.title}}</h3>
                </div>
            </a>
        </div>
    </div>
</div>
