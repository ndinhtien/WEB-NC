<!DOCTYPE html>
<html lang="en" ng-app="clientFashionApp">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fashion Gallery</title>
    <meta name="description"
        content="Discover the latest fashion trends across Street Style, Casual, and Formal categories" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-sanitize.min.js"></script>

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Header -->
    <header class="site-header">
        <div class="header-container">
            <a href="#!/" class="logo">
                <span class="logo-accent">✦</span> FASHION
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div ng-view></div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-container">
            <p>&copy; 2026 Fashion Gallery. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>

</html>
